version: '2'

run:
  timeout: 5m
  relative-path-mode: gomod
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    staticcheck:
      checks:
        - all
        - -QF1002
        - -QF1003
        - -QF1008
        - -S1016
        - -ST1000
        - -ST1001
        - -ST1005

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      module-path: github.com/r6m/gest
